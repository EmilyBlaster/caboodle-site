<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spot the Strategy · The People's Professors</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Work+Sans:wght@400;700;900&family=Courier+Prime&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    background: hsl(43,33%,93%);
    color: hsl(0,0%,10%);
    padding: 1.5rem;
    min-height: 100vh;
  }

  /* Header */
  .game-header { text-align: center; margin-bottom: 1.25rem; }
  .game-title {
    font-family: 'Permanent Marker', cursive;
    font-size: 2rem;
    display: inline-block;
    transform: rotate(-2deg);
    line-height: 1.2;
  }
  .game-subtitle { color: hsl(0,0%,53%); font-size: 0.875rem; margin-top: 0.25rem; }

  /* Score bar */
  .score-bar { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .score-box {
    background: white;
    border: 2px solid hsl(0,0%,10%);
    padding: 0.5rem 1rem;
    filter: drop-shadow(4px 4px 0 hsl(340,100%,71%));
    text-align: center;
    min-width: 80px;
  }
  .score-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(0,0%,53%); }
  .score-value { font-family: 'Work Sans', sans-serif; font-weight: 900; font-size: 1.25rem; color: hsl(340,100%,71%); }

  /* Progress */
  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(0,0%,53%); margin-bottom: 0.25rem; }
  .progress-track { height: 0.5rem; background: hsl(43,20%,90%); border: 2px solid hsl(0,0%,10%); }
  .progress-fill { height: 100%; background: hsl(200,100%,37%); transition: width 0.3s; }

  /* Game grid */
  .game-grid { display: grid; grid-template-columns: 290px 1fr; gap: 1rem; }
  @media (max-width: 700px) { .game-grid { grid-template-columns: 1fr; } .phone-col { display: none; } }

  /* Phone mockup */
  .phone-outer {
    background: hsl(0,0%,10%);
    border-radius: 40px;
    padding: 14px;
    filter: drop-shadow(4px 4px 0 hsl(340,100%,71%));
    transform: rotate(-3deg);
    width: 260px;
    margin: 0 auto;
  }
  .phone-screen {
    background: #000;
    border-radius: 32px;
    aspect-ratio: 9/16;
    overflow: hidden;
    position: relative;
  }
  .phone-screen iframe { width: 100%; height: 100%; border: none; display: block; }
  .phone-badge {
    position: absolute;
    left: 14px; bottom: 56px;
    background: hsl(340,100%,71%);
    font-family: 'Work Sans', sans-serif;
    font-weight: 700; font-size: 0.7rem;
    text-transform: uppercase;
    padding: 5px 9px; border-radius: 4px;
    color: white; z-index: 10;
  }
  .phone-meta {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    z-index: 10;
  }
  .phone-username { font-family: 'Work Sans', sans-serif; font-weight: 700; font-size: 0.8rem; color: white; margin-bottom: 2px; }
  .phone-hashtags { font-size: 0.65rem; color: rgba(255,255,255,0.85); }

  /* Strategy panel */
  .strategy-panel {
    background: white;
    border: 2px solid hsl(0,0%,10%);
    padding: 1rem;
    box-shadow: 4px 4px 0 hsl(0,0%,10%);
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .panel-heading { font-family: 'Work Sans', sans-serif; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
  .panel-sub { font-size: 0.8rem; color: hsl(0,0%,53%); }

  /* Scenario box */
  .scenario-box {
    background: hsl(50,100%,79%);
    padding: 0.75rem;
    border-left: 4px solid hsl(50,100%,63%);
    transform: rotate(-0.5deg);
  }
  .scenario-kicker { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(0,0%,53%); margin-bottom: 0.25rem; }
  .scenario-text { font-size: 0.82rem; line-height: 1.55; }

  /* Sticker grid */
  .sticker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
  @media (max-width: 500px) { .sticker-grid { grid-template-columns: repeat(3, 1fr); } }
  .sticker-btn {
    position: relative;
    aspect-ratio: 1;
    border: 2px solid hsl(0,0%,10%);
    background: hsl(43,33%,93%);
    cursor: pointer;
    padding: 0.35rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .sticker-btn img { width: 100%; height: 100%; object-fit: contain; }
  .sticker-btn.selected { border-color: hsl(340,100%,71%); background: hsl(50,100%,79%); filter: drop-shadow(4px 4px 0 hsl(340,100%,71%)); transform: rotate(-3deg); }
  .sticker-btn.correct-hit { border-color: hsl(155,100%,33%); }
  .sticker-btn.wrong-hit { border-color: hsl(340,100%,71%); }
  .sticker-btn.missed { border-color: hsl(155,100%,33%); background: hsl(155,50%,62%); }
  .sticker-btn.dimmed { opacity: 0.4; }
  .sticker-btn.active-explain { outline: 4px solid hsl(200,100%,37%); outline-offset: 2px; }
  .sticker-badge {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    border: 2px solid hsl(0,0%,10%);
  }
  .badge-correct { background: hsl(155,100%,33%); color: white; }
  .badge-wrong { background: hsl(340,100%,71%); color: white; }
  .badge-missed { background: hsl(50,100%,63%); color: hsl(155,100%,33%); }

  /* Feedback */
  .feedback-summary { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; }
  .feedback-title { font-family: 'Work Sans', sans-serif; font-weight: 800; text-transform: uppercase; font-size: 0.875rem; }
  .feedback-stats { display: flex; flex-wrap: wrap; gap: 0.75rem; font-size: 0.75rem; }
  .feedback-explain { padding: 1rem; }
  .explain-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .explain-icon { font-size: 1.25rem; }
  .explain-label { font-family: 'Work Sans', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; }
  .explain-text { font-size: 0.875rem; line-height: 1.6; }

  /* Buttons */
  .btn-row { display: flex; gap: 0.75rem; margin-top: auto; padding-top: 0.75rem; }
  .btn {
    font-family: 'Work Sans', sans-serif; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.75rem 1.25rem;
    border: 3px solid hsl(0,0%,10%);
    cursor: pointer; font-size: 0.875rem;
    transition: opacity 0.15s;
  }
  .btn:disabled { cursor: not-allowed; opacity: 0.5; }
  .btn-back { background: hsl(43,20%,90%); color: hsl(0,0%,10%); }
  .btn-submit { flex: 1; background: hsl(340,100%,71%); color: white; }
  .btn-submit:disabled { background: hsl(43,20%,90%); color: hsl(0,0%,53%); }
  .btn-next { flex: 1; background: hsl(0,0%,10%); color: hsl(43,33%,93%); }

  /* Results */
  .results { text-align: center; padding: 3rem 1rem; }
  .results-title { font-family: 'Permanent Marker', cursive; font-size: 2.5rem; display: inline-block; transform: rotate(-2deg); margin-bottom: 1rem; }
  .results-score { font-family: 'Work Sans', sans-serif; font-weight: 900; font-size: 4rem; color: hsl(340,100%,71%); margin-bottom: 1rem; }
  .results-msg { font-size: 1rem; max-width: 560px; margin: 0 auto 2rem; line-height: 1.6; }
  .btn-restart { background: hsl(200,100%,37%); color: white; border: 3px solid hsl(0,0%,10%); font-family: 'Work Sans', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 1rem 2.5rem; cursor: pointer; font-size: 0.875rem; }
</style>
</head>
<body>

<div id="game"></div>

<script>
const scenarios = [
  {
    creatorType: "Barista", username: "@latteartist", hashtags: "#latteart #barista #coffeetok",
    scenario: "A barista starts mid-pour with milk swirling. \"See that wobble? That's your whole problem right there.\" They fix the technique in one focused tip, then ask \"Drop a ☕ if this helped!\"",
    videoUrl: "https://player.vimeo.com/video/1150736839?autoplay=0&loop=0",
    correct: ["hook","chunking","visual","engagement"],
    explanations: {
      hook: "HOOK: ✓ Starting mid-pour with 'See that wobble?' is a pattern interrupt that names the viewer's frustration immediately.",
      chunking: "CHUNKING: ✓ One focused tip about one technique — not a full latte art tutorial. Classic nano-learning.",
      visual: "VISUAL ATTENTION: ✓ The mid-pour demonstration shows the technique visually, letting viewers see exactly what 'wobble' means.",
      engagement: "ENGAGEMENT: ✓ 'Drop a ☕ if this helped' directly invites viewer participation.",
      sequencing: "SEQUENCING: ✗ This is a standalone tip, not explicitly connected to a series or learning path."
    }
  },
  {
    creatorType: "Mechanic", username: "@gaborage", hashtags: "#cartok #mechanic #wintercar",
    scenario: "A mechanic says \"Part 2 of cold weather car problems. Your car won't start and it's 10 degrees out? Here's the one thing to check before you call a tow truck.\" Close-up on the battery with text overlay \"CHECK THIS FIRST\" appearing as they point to the terminals.",
    videoUrl: "https://player.vimeo.com/video/1150861478?autoplay=0&loop=0",
    correct: ["hook","chunking","visual","sequencing"],
    explanations: {
      hook: "HOOK: ✓ 'Your car won't start and it's 10 degrees out?' immediately identifies with the viewer's problem.",
      chunking: "CHUNKING: ✓ 'The ONE thing to check' — ruthlessly focused on a single actionable item.",
      visual: "VISUAL ATTENTION: ✓ Close-up on the relevant part with synchronized text overlay follows multimedia principles perfectly.",
      engagement: "ENGAGEMENT: ✗ No direct call to action or invitation to participate/comment.",
      sequencing: "SEQUENCING: ✓ 'Part 2 of cold weather car problems' explicitly places this in a series."
    }
  },
  {
    creatorType: "Knitter", username: "@stitchcraft", hashtags: "#knittok #knitting #cableknit",
    scenario: "A knitter shows a close-up of hands with high contrast yarn. \"Everyone overcomplicates cable crosses. Watch.\" Key terms appear as text exactly when spoken. Ends with \"Questions? Ask in comments — I read them all.\"",
    videoUrl: "https://player.vimeo.com/video/1150869759?autoplay=0&loop=0",
    correct: ["hook","chunking","visual","engagement"],
    explanations: {
      hook: "HOOK: ✓ 'Everyone overcomplicates this' challenges the viewer's assumption and promises simplification.",
      chunking: "CHUNKING: ✓ Focused on ONE technique — the cable cross — not a whole project.",
      visual: "VISUAL ATTENTION: ✓ High contrast visuals with synchronized text overlays that reinforce key steps.",
      engagement: "ENGAGEMENT: ✓ 'Questions? Ask in comments — I read them all' invites direct community participation.",
      sequencing: "SEQUENCING: ✗ No explicit connection to a series or progression of skills."
    }
  },
  {
    creatorType: "Gamer", username: "@stratking", hashtags: "#gaming #darksouls #bossfight",
    scenario: "A gamer says \"I asked you to send your worst boss fight fails. This one? *chef's kiss*\" Shows viewer's clip, then breaks down the ONE mistake they're making. \"Send me yours — best fails get a breakdown next week.\"",
    videoUrl: "https://player.vimeo.com/video/1150871207?autoplay=0&loop=0",
    correct: ["hook","chunking","engagement","sequencing"],
    explanations: {
      hook: "HOOK: ✓ 'I asked you to send your worst fails' creates curiosity and social proof immediately.",
      chunking: "CHUNKING: ✓ Focused on diagnosing ONE mistake from the submitted clip.",
      visual: "VISUAL ATTENTION: ✗ No strategic use of visual scaffolding like highlights or text overlays.",
      engagement: "ENGAGEMENT: ✓ The entire format is community-driven — featuring viewer content and inviting more submissions.",
      sequencing: "SEQUENCING: ✓ 'Best fails get a breakdown next week' creates an ongoing series expectation."
    }
  },
  {
    creatorType: "Fitness Coach", username: "@fitform", hashtags: "#fitness #squat #formcheck",
    scenario: "A fitness coach says \"If you're new here, start with this one.\" Shows proper squat form with arrows highlighting knee alignment and text \"KNEES TRACK TOES\" synced to voiceover. \"Got this down? Link to intermediate depth work in bio.\"",
    videoUrl: "https://player.vimeo.com/video/1150873595?autoplay=0&loop=0",
    correct: ["chunking","visual","sequencing"],
    explanations: {
      hook: "HOOK: ✗ 'If you're new here, start with this one' is informative but not a strong pattern interrupt.",
      chunking: "CHUNKING: ✓ Focused on ONE element of squat form — knee alignment — not a full workout routine.",
      visual: "VISUAL ATTENTION: ✓ Arrows highlighting alignment + synchronized text overlay is strategic visual scaffolding.",
      engagement: "ENGAGEMENT: ✗ No direct invitation to comment, share, or participate.",
      sequencing: "SEQUENCING: ✓ Explicit beginner/intermediate progression with 'If you're new here' and 'Link to intermediate in bio.'"
    }
  },
  {
    creatorType: "Home Cook", username: "@quickbites", hashtags: "#cooktok #garlic #kitchentips",
    scenario: "A home cook films from POV angle: \"Stop. Putting. Garlic. In. First.\" Each word punctuated with a pan shot. Shows the sizzle difference when garlic goes in last. \"What kitchen mystery should I solve next? Comment below.\"",
    videoUrl: "https://player.vimeo.com/video/1150881320?autoplay=0&loop=0",
    correct: ["hook","chunking","visual","engagement"],
    explanations: {
      hook: "HOOK: ✓ 'Stop. Putting. Garlic. In. First.' is a pattern interrupt that challenges common behavior immediately.",
      chunking: "CHUNKING: ✓ ONE kitchen truth — when to add garlic. Perfect nano-learning.",
      visual: "VISUAL ATTENTION: ✓ POV angle + showing the actual sizzle difference demonstrates visually, not just tells.",
      engagement: "ENGAGEMENT: ✓ 'What kitchen mystery should I solve next?' directly invites audience participation.",
      sequencing: "SEQUENCING: ✗ Standalone tip — no explicit connection to a series or learning progression."
    }
  }
];

const STRATEGIES = ["hook","chunking","visual","engagement","sequencing"];
const LABELS = { hook:"Hook", chunking:"Chunking", visual:"Visual Attention", engagement:"Engagement", sequencing:"Sequencing" };
const STICKERS = {
  hook: "https://i.ibb.co/PG5NQnWN/hook.png",
  chunking: "https://i.ibb.co/Fb92NrHG/chunking.png",
  visual: "https://i.ibb.co/cSQRxdRV/visual-attention.png",
  engagement: "https://i.ibb.co/spNGPSVM/engagement.png",
  sequencing: "https://i.ibb.co/LD0bkLs2/Sequencing.png"
};

let state = {
  round: 0, correct: 0,
  selected: new Set(),
  submitted: false,
  activeStrategy: null,
  feedbackType: null,
  showResults: false
};

function render() {
  const el = document.getElementById('game');
  const s = state;
  const scenario = scenarios[s.round];
  const correctSet = new Set(scenario.correct);
  const pct = (s.round / scenarios.length) * 100;

  let html = `
    <div class="game-header">
      <div class="game-title">Spot the Strategy</div>
      <p class="game-subtitle">Watch the video. Identify which strategies the creator used.</p>
    </div>
    <div class="score-bar">
      <div class="score-box"><div class="score-label">Correct</div><div class="score-value">${s.correct}</div></div>
      <div class="score-box"><div class="score-label">Round</div><div class="score-value">${s.round+1}/${scenarios.length}</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-labels"><span>Progress</span><span>${s.showResults ? '100%' : Math.round(pct)+'%'}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${s.showResults?100:pct}%"></div></div>
    </div>
  `;

  if (s.showResults) {
    const pctScore = (s.correct / scenarios.length) * 100;
    let msg = pctScore === 100
      ? "Perfect score! You've mastered the art of spotting creator strategies. Your social media feed will never look the same."
      : pctScore >= 66
      ? "Great job! You're developing a sharp eye for creator strategies. With practice, you'll spot these patterns everywhere."
      : pctScore >= 33
      ? "Good start! Recognizing these strategies takes practice. Try again and pay close attention to what each creator does."
      : "Keep practicing! These strategies can be subtle. Focus on the opening, how much content is covered, and whether there's a call to action.";
    html += `
      <div class="results">
        <div class="results-title">Game Complete!</div>
        <div class="results-score">${s.correct}/${scenarios.length}</div>
        <p class="results-msg">${msg}</p>
        <button class="btn-restart" onclick="restart()">Play Again</button>
      </div>
    `;
  } else {
    // Sticker buttons
    let stickerHtml = '';
    for (const strat of STRATEGIES) {
      const userSel = s.selected.has(strat);
      const isCor = correctSet.has(strat);
      let cls = 'sticker-btn';
      let badgeHtml = '';
      if (!s.submitted) {
        if (userSel) cls += ' selected';
      } else {
        if (s.activeStrategy === strat) cls += ' active-explain';
        if (userSel && isCor) { cls += ' correct-hit'; badgeHtml = `<div class="sticker-badge badge-correct">✓</div>`; }
        else if (userSel && !isCor) { cls += ' wrong-hit'; badgeHtml = `<div class="sticker-badge badge-wrong">✗</div>`; }
        else if (!userSel && isCor) { cls += ' missed'; badgeHtml = `<div class="sticker-badge badge-missed">!</div>`; }
        else cls += ' dimmed';
      }
      stickerHtml += `<button class="${cls}" onclick="clickSticker('${strat}')" title="${LABELS[strat]}">
        <img src="${STICKERS[strat]}" alt="${LABELS[strat]}" />
        ${badgeHtml}
      </button>`;
    }

    // Feedback section
    let feedbackHtml = '';
    if (s.submitted && s.feedbackType) {
      const corrSel = [...s.selected].filter(x => correctSet.has(x)).length;
      const wrongSel = [...s.selected].filter(x => !correctSet.has(x)).length;
      const missed = [...correctSet].filter(x => !s.selected.has(x)).length;
      const fbColors = { correct: 'hsl(155,50%,62%)', partial: 'hsl(50,100%,79%)', incorrect: 'hsl(340,100%,85%)' };
      const fbBorder = { correct: 'hsl(155,100%,33%)', partial: 'hsl(50,100%,63%)', incorrect: 'hsl(340,100%,71%)' };
      const fbTitle = { correct: '✓ Perfect!', partial: '~ Close!', incorrect: '✗ Not Quite' };
      feedbackHtml = `
        <div class="feedback-summary" style="border-left:4px solid ${fbBorder[s.feedbackType]};background:${fbColors[s.feedbackType]}">
          <div class="feedback-title">${fbTitle[s.feedbackType]}</div>
          <div class="feedback-stats">
            <span style="color:hsl(155,100%,33%)">✓ ${corrSel} of ${correctSet.size} correct</span>
            ${missed > 0 ? `<span style="color:hsl(45,90%,40%)">! ${missed} missed</span>` : ''}
            ${wrongSel > 0 ? `<span style="color:hsl(340,100%,71%)">✗ ${wrongSel} incorrect</span>` : ''}
          </div>
        </div>
      `;
      if (s.activeStrategy) {
        const isC = correctSet.has(s.activeStrategy);
        feedbackHtml += `
          <div class="feedback-explain" style="border-left:4px solid ${isC?'hsl(155,100%,33%)':'hsl(340,100%,71%)'};background:${isC?'hsl(155,50%,62%)':'hsl(340,100%,85%)'}">
            <div class="explain-head">
              <span class="explain-icon" style="color:${isC?'hsl(155,100%,33%)':'hsl(340,100%,71%)'}">${isC?'✓':'✗'}</span>
              <span class="explain-label">${LABELS[s.activeStrategy]}</span>
            </div>
            <p class="explain-text">${scenario.explanations[s.activeStrategy]}</p>
          </div>
        `;
      }
    }

    // Buttons
    const isLast = s.round >= scenarios.length - 1;
    let btnHtml = '';
    if (s.round > 0) btnHtml += `<button class="btn btn-back" onclick="goBack()">← Back</button>`;
    if (!s.submitted) {
      btnHtml += `<button class="btn btn-submit" onclick="submit()" ${s.selected.size===0?'disabled':''}>Check My Answers</button>`;
    } else {
      btnHtml += `<button class="btn btn-next" onclick="next()">${isLast ? 'See Results →' : 'Next Round →'}</button>`;
    }

    html += `
      <div class="game-grid">
        <div class="phone-col">
          <div class="phone-outer">
            <div class="phone-screen">
              <iframe src="${scenario.videoUrl}" allow="autoplay; fullscreen"></iframe>
              <div class="phone-badge">${scenario.creatorType}</div>
              <div class="phone-meta">
                <div class="phone-username">${scenario.username}</div>
                <div class="phone-hashtags">${scenario.hashtags}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="strategy-panel">
          <div class="panel-heading">Which strategies did you spot?</div>
          <p class="panel-sub">${s.submitted ? 'Click any sticker to see its explanation' : 'Select all strategies the creator used in this video'}</p>
          <div class="scenario-box">
            <div class="scenario-kicker">Scenario</div>
            <div class="scenario-text">${scenario.scenario}</div>
          </div>
          <div class="sticker-grid">${stickerHtml}</div>
          ${feedbackHtml}
          <div class="btn-row">${btnHtml}</div>
        </div>
      </div>
    `;
  }

  el.innerHTML = html;
}

function clickSticker(strat) {
  if (state.submitted) { state.activeStrategy = strat; render(); return; }
  if (state.selected.has(strat)) state.selected.delete(strat);
  else state.selected.add(strat);
  render();
}

function submit() {
  const correctSet = new Set(scenarios[state.round].correct);
  let matches = 0, wrong = 0;
  state.selected.forEach(s => { if (correctSet.has(s)) matches++; else wrong++; });
  const perfect = matches === correctSet.size && wrong === 0;
  const partial = matches > 0 && !perfect;
  state.feedbackType = perfect ? 'correct' : partial ? 'partial' : 'incorrect';
  if (perfect) state.correct++;
  state.submitted = true;
  state.activeStrategy = STRATEGIES[0];
  render();
}

function next() {
  if (state.round >= scenarios.length - 1) { state.showResults = true; render(); return; }
  state.round++; state.selected = new Set();
  state.submitted = false; state.activeStrategy = null; state.feedbackType = null;
  render();
}

function goBack() {
  if (state.round === 0) return;
  state.round--; state.selected = new Set();
  state.submitted = false; state.activeStrategy = null; state.feedbackType = null;
  render();
}

function restart() {
  state = { round:0, correct:0, selected:new Set(), submitted:false, activeStrategy:null, feedbackType:null, showResults:false };
  render();
}

render();
</script>
</body>
</html>

# ============================================================================
# netlify.toml — build + deploy config for caboodle-site
# ============================================================================

[build]
  # No build step — this is static HTML/CSS/JS.
  # Netlify deploys the repo root as-is.
  publish = "."

# ─── Files to exclude from deploy ───────────────────────────────────────────
# Belt-and-suspenders alongside .gitignore. If a reference folder ever sneaks
# into a commit, Netlify still won't publish it.

[build.processing]
  skip_processing = false

# ─── Asset processing ───────────────────────────────────────────────────────
# Let Netlify minify + optimize CSS/JS/HTML on deploy. Free perf win.

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ─── Security + cache headers live in /_headers (better for granular rules)
# Redirects live in /_redirects if you need them later.
